schema_version: v1alpha1
description: >
  Single source of truth for addon-to-engine mapping, tier assignment, evidence,
  and high-level feature coverage. Real data should eventually include one record
  for every addon found in kubeblocks-addons.

required_fields:
  - addon
  - engine
  - tier
  - entry_skill
  - addon_repo_path
  - example_refs
  - docs_refs
  - core_refs
  - support_level
  - evidence_confidence
  - supported_ops
  - supported_observability

allowed_support_levels:
  - official
  - provisional
  - examples-only

allowed_evidence_confidence:
  - high
  - medium
  - low

field_notes:
  tier: "tier1-dedicated | tier2-family | tier3-generic"
  family: "optional reference-only taxonomy value; must be one of sql, streaming, vector, search, ts-analytics, coordination, graph, or null"
  docs_refs: "official public docs keys or URLs that may be used at runtime"
  example_refs: "maintainer-only example provenance that establishes engine/create/ops evidence; not a runtime prerequisite"
  core_refs: "maintainer-only KubeBlocks core API/controller evidence, usually symbolic refs such as kubeblocks-core:apis/apps/v1/cluster_types.go"
  support_level: "official | provisional | examples-only"
  evidence_confidence: "high | medium | low"
  example_dir: "optional coarse locator for human navigation; cannot replace example_refs"
  supported_ops: "logical capability families, not raw OpsRequest names"
  supported_observability: "minimum exporter / pod-monitor support hints"

example:
  addon: mysql
  engine: mysql
  tier: tier1-dedicated
  entry_skill: kubeblocks-engine-mysql
  family: sql
  addon_repo_path: addons/mysql
  example_refs:
    - examples/mysql/cluster.yaml
    - examples/mysql/opsrequest.yaml
  docs_refs:
    - "kubeblocks-docs:databases"
  core_refs:
    - "kubeblocks-core:apis/apps/v1/cluster_types.go"
  support_level: official
  evidence_confidence: high
  supported_ops:
    - lifecycle
    - horizontal_scale
    - vertical_scale
    - volume_expansion
    - reconfigure
    - switchover
    - backup
    - restore
    - expose
  supported_observability:
    exporter: true
    pod_monitor_example: true
  example_dir: examples/mysql
  notes: ""
