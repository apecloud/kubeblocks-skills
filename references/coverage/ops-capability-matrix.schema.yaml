schema_version: v1alpha1
description: >
  Engine x operation capability matrix. Tier-1 engines must populate the minimum
  required columns before the V2 routing is considered stable.

required_fields:
  - engine
  - start
  - stop
  - restart
  - horizontal_scale
  - vertical_scale
  - volume_expansion
  - monitoring_exporter
  - account
  - logs
  - reconfigure
  - switchover
  - failover_model
  - expose
  - backup
  - restore
  - rebuild_instance
  - core_refs
  - support_level
  - evidence_confidence
  - evidence_refs

allowed_status_values:
  - supported
  - partial
  - unsupported
  - unknown

allowed_failover_models:
  - automatic
  - manual
  - not_applicable
  - unknown

allowed_support_levels:
  - official
  - provisional
  - examples-only

allowed_evidence_confidence:
  - high
  - medium
  - low

tier1_minimum_required:
  - start
  - stop
  - restart
  - horizontal_scale
  - vertical_scale
  - volume_expansion
  - monitoring_exporter

example:
  engine: mysql
  start: supported
  stop: supported
  restart: supported
  horizontal_scale: supported
  vertical_scale: supported
  volume_expansion: supported
  monitoring_exporter: supported
  account: supported
  logs: supported
  reconfigure: supported
  switchover: supported
  failover_model: automatic
  expose: supported
  backup: supported
  restore: supported
  rebuild_instance: supported
  core_refs:
    - "kubeblocks-core:apis/operations/v1alpha1/opsrequest_types.go"
  support_level: official
  evidence_confidence: high
  evidence_refs:
    - examples/mysql/start.yaml
    - examples/mysql/stop.yaml
    - examples/mysql/restart.yaml
    - examples/mysql/scale-out.yaml
    - examples/mysql/verticalscale.yaml
    - examples/mysql/volumeexpand.yaml
