schema_version: v1alpha1
name: eval-case
description: >
  Machine-readable schema for a live-eval scenario. This schema defines how a
  cold-start agent should be evaluated against a concrete KubeBlocks workflow
  without relying on ad hoc thread instructions.

required:
  - id
  - title
  - intent
  - mode
  - target
  - expected_path
  - forbidden_paths
  - allowed_secondary_evidence
  - steps
  - stop_rules
  - rubric_labels

mode_enum:
  - read-only
  - dry-run-only
  - write-sandbox
  - destructive-demo

allowed_secondary_evidence_enum:
  - none
  - docs-only
  - addons
  - core
  - any-open-source

target_required:
  - cluster_context
  - namespace_policy

namespace_policy_examples:
  - dedicated-test-namespace
  - existing-demo-namespace
  - cluster-wide-read-only

steps_required:
  - id
  - kind
  - instruction
  - allowed_actions
  - forbidden_actions
  - expected_outcome

step_kind_enum:
  - route
  - preflight
  - dry-run
  - apply
  - day2
  - observability
  - delete-plan

rubric_label_enum:
  - route-error
  - preflight-miss
  - runtime-dependency-leak
  - unsupported-action-hallucination
  - observability-overclaim
  - live-compatibility-drift
  - verification-gap
  - report-order-deviation
  - conservative-underclaim
  - self-healed-infra-warning

notes:
  - expected_path should list the intended primary skill path in execution order.
  - forbidden_paths should list the fallbacks or legacy paths that must not become the main route.
  - stop_rules should make timeout, failure, and no-self-heal expectations explicit.
  - This schema defines scenario truth only; it does not require a fully automated runner.
