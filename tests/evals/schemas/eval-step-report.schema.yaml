schema_version: v1alpha1
name: eval-step-report
description: >
  Machine-readable schema for one live-eval step result. This captures both the
  executor's observed result and Oracle's final judgement for the step.

required:
  - case_id
  - step_id
  - chosen_path
  - artifacts_used
  - external_secondary_evidence_used
  - actions
  - observed_state
  - executor_result
  - oracle_judgement

executor_result_enum:
  - pass
  - fail

external_secondary_evidence_enum:
  - none
  - docs-only
  - addons
  - core
  - any-open-source

oracle_judgement_required:
  - status
  - labels

oracle_judgement_status_enum:
  - pass
  - hard-fail
  - observation

label_enum:
  - route-error
  - preflight-miss
  - runtime-dependency-leak
  - unsupported-action-hallucination
  - observability-overclaim
  - live-compatibility-drift
  - verification-gap
  - report-order-deviation
  - conservative-underclaim
  - self-healed-infra-warning

recommended_optional_fields:
  - oracle_judgement.severity
  - oracle_judgement.notes
  - oracle_judgement.issue_id
  - evidence
  - issues

evidence_examples:
  - command_output_excerpt
  - resource_name
  - file_path
  - event_snippet

notes:
  - labels may be empty when the step is a clean pass.
  - conditional labels such as live-compatibility-drift and verification-gap require Oracle judgement to resolve final severity.
  - evidence is optional but strongly recommended for any issue-bearing step.
