schema_version: v1alpha1
name: live-eval-rubric
description: >
  Severity and judgement policy for agent-capability live evaluations. This
  rubric scores the agent's behavior on a real cluster, separate from the
  repo-completeness validators.

severity_policy:
  route-error: hard-fail
  preflight-miss: hard-fail
  runtime-dependency-leak: hard-fail
  unsupported-action-hallucination: hard-fail
  observability-overclaim: hard-fail
  live-compatibility-drift: conditional
  verification-gap: conditional
  report-order-deviation: observation
  conservative-underclaim: observation
  self-healed-infra-warning: observation

conditional_rules:
  live-compatibility-drift:
    observation_when:
      - the agent explicitly identifies the live drift
      - the agent stops safely or corrects with live-environment evidence
      - the main path remains executable after the correction
    hard_fail_when:
      - the drift blocks the main path and repo truth provides no safe correction space
      - the agent masks the drift with unsupported improvisation
  verification-gap:
    hard_fail_when:
      - a create, restart, delete, or restore step skips the required dry-run, wait, or post-change verification
    observation_when:
      - a route-only or judgement-only step lacks auxiliary verification while the core conclusion remains supported

execution_principles:
  - repo-completeness and live-eval scoring are separate test lines
  - repo fact and workspace draft must never be conflated
  - runtime should not require addons/core checkout for the main path
  - optional secondary evidence is allowed when available, but never becomes the primary truth

notes:
  - A case can still pass overall when a step records an observation-only issue.
  - Conditional labels require Oracle to set final severity in the step report.
