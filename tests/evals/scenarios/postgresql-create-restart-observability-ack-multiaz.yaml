schema_version: v1alpha1
id: postgresql-create-restart-observability-ack-multiaz
title: PostgreSQL create, restart, and observability routing on ACK multi-AZ
intent: >
  A cold-start agent should provision a PostgreSQL cluster on the Singapore ACK
  environment, restart it through the Day-2 lifecycle entry, and judge the
  observability path and current readiness level without installing a monitoring
  stack.
mode: write-sandbox

target:
  cluster_context: ack-singapore
  namespace_policy:
    type: dedicated-test-namespace
    value: kbskills-eval-sg
  cluster_name: kbseval-pg
  preserve_after_case: true

expected_path:
  - SKILL.md
  - kubeblocks-preflight
  - kubeblocks-engine-postgresql
  - kubeblocks-op-lifecycle
  - kubeblocks-observability-router

forbidden_paths:
  - kubeblocks-engine-generic
  - kubeblocks-create-cluster
  - kubeblocks-family-sql
  - kubeblocks-addon-postgresql
  - kubeblocks-engine-tidb

allowed_secondary_evidence: any-open-source

rubric_labels:
  - route-error
  - preflight-miss
  - runtime-dependency-leak
  - unsupported-action-hallucination
  - observability-overclaim
  - live-compatibility-drift
  - verification-gap
  - report-order-deviation
  - conservative-underclaim
  - self-healed-infra-warning

stop_rules:
  timeout_per_state_change: 15m
  stop_on_stateful_failure: true
  forbid_unapproved_topology_change: true
  forbid_self_heal_by_extra_opsrequest: true
  stop_after_case_completion: true

steps:
  - id: A-1
    kind: route
    instruction: >
      Resolve the primary route for a first-time PostgreSQL rollout on an
      environment that is not yet fully profiled.
    allowed_actions:
      - read root SKILL.md
      - read kubeblocks-preflight
      - read kubeblocks-engine-postgresql
    forbidden_actions:
      - apply resources
      - use kubeblocks-engine-generic as the main path
      - use kubeblocks-addon-postgresql as the main path
    expected_outcome: >
      Route to kubeblocks-preflight first, then reserve kubeblocks-engine-postgresql
      as the create-time entry, with kubeblocks-op-lifecycle and
      kubeblocks-observability-router as the follow-up layers.

  - id: A-2
    kind: preflight
    instruction: >
      Produce a recommendation bundle for PostgreSQL on ACK multi-AZ, including
      storage class, volume-binding judgement, addon readiness, and the
      observability starting path.
    allowed_actions:
      - inspect nodes, storage classes, Helm releases, cluster definitions
      - inspect volumesnapshotclasses
      - inspect existing monitoring workloads
    forbidden_actions:
      - create cluster objects
      - create or delete add-ons
      - install monitoring stack
    expected_outcome: >
      Recommend alicloud-disk-topology-alltype with WaitForFirstConsumer,
      confirm PostgreSQL addon readiness, and choose bootstrap-stack with a
      metrics-ready starting target.

  - id: A-3
    kind: dry-run
    instruction: >
      Draft the PostgreSQL Cluster manifest and validate it with
      kubectl apply --dry-run=server.
    allowed_actions:
      - write ./oracle-eval/case-a-postgresql/kbseval-pg.yaml
      - kubectl apply --dry-run=server
    forbidden_actions:
      - real apply
      - fallback to raw addon examples as the primary create path
      - change topology away from replication without approval
    expected_outcome: >
      A manifest for kbseval-pg in kbskills-eval-sg passes server dry-run with
      clusterDef postgresql, topology replication, and sandbox-sized resources.

  - id: A-4
    kind: apply
    instruction: >
      Apply the approved PostgreSQL manifest, wait for the cluster to reach
      Running, and verify pods and services.
    allowed_actions:
      - kubectl apply approved manifest
      - watch cluster phase
      - verify pods and services after Running
    forbidden_actions:
      - switch topology
      - change manifest after apply without Oracle approval
      - delete the cluster inside this case
    expected_outcome: >
      kbseval-pg reaches Running in kbskills-eval-sg and PostgreSQL pods become
      fully Ready.

  - id: A-5
    kind: day2
    instruction: >
      Execute a single restart through kubeblocks-op-lifecycle, verify the
      OpsRequest progression, and confirm the cluster returns to Running.
    allowed_actions:
      - create one restart OpsRequest
      - watch OpsRequest and Cluster objects
      - verify post-restart pod readiness
    forbidden_actions:
      - stop/start as a substitute for restart
      - create a second OpsRequest as self-heal
      - hide apiVersion drift instead of reporting it
    expected_outcome: >
      The restart succeeds, the cluster transitions through Updating back to
      Running, and any live compatibility drift is explicitly captured.

  - id: A-6
    kind: observability
    instruction: >
      Judge the correct observability next hop and the current readiness level
      for kbseval-pg without installing Prometheus or Grafana.
    allowed_actions:
      - inspect existing Prometheus/Grafana workloads
      - inspect postgres-exporter and metrics endpoints
      - inspect ServiceMonitor/PodMonitor presence
    forbidden_actions:
      - install kube-prometheus-stack
      - create PodMonitor or ServiceMonitor
      - modify cluster manifest
    expected_outcome: >
      Route to kubeblocks-observability-bootstrap-stack and declare
      metrics-ready, with an explicit explanation of why the environment is not
      scrape-ready, dashboard-ready, or alerting-ready.
